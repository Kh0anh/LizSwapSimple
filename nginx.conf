# [NFR-02] Cấu hình nginx để serve Next.js Static Export
# Next.js static export tạo ra file HTML cho mỗi route,
# nginx phục vụ trực tiếp không cần server-side rendering.

server {
    listen 80;
    server_name localhost;

    # Thư mục gốc chứa file tĩnh được build bởi Next.js
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình nén gzip để giảm băng thông truyền tải
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache control cho static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Route chính: phục vụ HTML theo đúng path Next.js App Router
    # Next.js static export tạo file /pool/index.html cho route /pool
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Trang 404 tùy chỉnh
    error_page 404 /404.html;
}

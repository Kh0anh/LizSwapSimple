# [NFR-02] SSL override cho Docker Compose
# Dung kem docker-compose.yml de mo cong 443 va nap chung chi SSL.
# Cach chay:
#   docker compose -f docker-compose.yml -f docker-compose.ssl.yml up --build -d

services:
  frontend:
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_SSL_CONFIG_PATH:-./nginx.ssl.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERTS_PATH:-./ssl}:/etc/nginx/ssl:ro

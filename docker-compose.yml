# [NFR-02] Docker Compose — LizSwapSimple DEX Frontend
# Khởi động Frontend tĩnh tại localhost:80 chỉ với lệnh:
#   docker compose up --build
#
# Yêu cầu: Docker Engine >= 24 / Docker Desktop
# Không cần Node.js cài sẵn trên máy host.

services:
  frontend:
    # Luon build image moi khi chay `docker compose up` de tranh giao dien cu.
    pull_policy: build

    # Build image từ Dockerfile tại thư mục root (.)
    build:
      context: .
      dockerfile: Dockerfile
      # Target stage runner (production-ready, bỏ qua builder artifacts)
      target: runner
      args:
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID}
        NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL}
        NEXT_PUBLIC_ROUTER_ADDRESS: ${NEXT_PUBLIC_ROUTER_ADDRESS}
        NEXT_PUBLIC_FACTORY_ADDRESS: ${NEXT_PUBLIC_FACTORY_ADDRESS}
        NEXT_PUBLIC_ALLOW_DEPLOYED_FALLBACK: ${NEXT_PUBLIC_ALLOW_DEPLOYED_FALLBACK:-false}

    # Map port: host:80 -> container:80 (nginx listen port 80)
    # Co the doi HTTP_PORT trong .env neu host da dung cong 80.
    ports:
      - "${HTTP_PORT:-80}:80"

    # Inject biến môi trường từ file .env vào container build
    # Các biến NEXT_PUBLIC_* cần có khi build (không phải runtime)
    env_file:
      - .env

    # Restart policy: Tự động khởi động lại nếu container crash
    restart: unless-stopped

    # Health check: Kiểm tra nginx đang hoạt động mỗi 30s
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
